<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Stu Perry Therapeutic Coaching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --stone: #f5f2ee;
      --warm-white: #faf8f5;
      --ink: #1c1a18;
      --mist: #8a8680;
      --sage: #7a8c7e;
      --rust: #9e6b4a;
      --border: #e2ddd8;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--ink);
      background: var(--warm-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      color: var(--ink);
    }

    p {
      color: var(--mist);
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-white);
      background: var(--ink);
      padding: 0.9rem 2rem;
      text-decoration: none;
      transition: background 0.2s;
    }

    .home-link:hover { background: var(--rust); }
  </style>
</head>
<body>
  <p class="label">404</p>
  <h1>Page not found.</h1>
  <p>The page you're looking for doesn't exist or may have moved. Let's get you back to somewhere familiar.</p>
  <a href="/" class="home-link">Return home →</a>
</body>
</html>
